services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: contrapunctus
      POSTGRES_USER: contrapunctus
      POSTGRES_PASSWORD: contrapunctus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contrapunctus -d contrapunctus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
