      <h1>Contrapunctus — Compose with clarity</h1>
      <p>Built for theory students, educators, and the music theory community.</p>
      <p>A music theory platform with real-time harmonic analysis, part-writing feedback,
        and non-chord tone detection. Join a community of theory enthusiasts solving exercises,
        or use the classroom tools to author assignments and track student progress.</p>
      <h2>Practice with the community</h2>
      <p>Create exercises, solve others' challenges, earn points, and climb the ranks.</p>
      <h2>Designed for the theory classroom</h2>
      <p>Set up a class, share an invite link, author custom exercises, and track student progress from a single gradebook view.</p>
      <h2>Powered by real-time analysis</h2>
      <ul>
        <li>Real-Time Harmonic Analysis — Roman numerals and chord types appear instantly as you write.</li>
        <li>Part-Writing Error Detection — Catch parallel fifths, voice crossing, spacing errors, and more.</li>
        <li>Non-Chord Tone Detection — Passing tones, neighbor tones, and suspensions automatically classified.</li>
        <li>Multi-Voice Composition — Write for any number of voices across treble and bass clefs.</li>
        <li>Key and Scale Awareness — Analysis adapts to major, minor, and modal contexts.</li>
        <li>Music Playback — Listen to your composition with sampled instruments.</li>
      </ul>
      <h2>Who it's for</h2>

      <p>Educators — Create classes, author exercises, review submissions, and track completion.</p>
      <p>Theory Enthusiasts — Challenge yourself with community exercises and climb the ranks.</p>
